services:
  - type: web
    name: insuresight-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        sync: false          # Render will prompt you to enter this securely
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Vercel URL after deploying frontend
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CHROMA_DB_PATH
        value: ./chroma_db
